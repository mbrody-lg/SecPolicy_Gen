# A sample workflow which checks out the code, builds a container
# image using Docker and scans that image for vulnerabilities using
# Snyk. The results are then uploaded to GitHub Security Code Scanning

name: Snyk Container

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '43 6 * * 2'

permissions:
  contents: read

jobs:
  snyk:
    environment: test
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent:
          - context-agent
          - policy-agent
          - validator-agent
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - name: Build a Docker image for ${{ matrix.agent }}
      run: docker build -t ${{ matrix.agent }}:test -f ${{ matrix.agent }}/Dockerfile ${{ matrix.agent }}/
    - name: Check Snyk authentication availability
      id: snyk-auth
      shell: bash
      run: |
        if [ -n "${SNYK_TOKEN}" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Skip Snyk scan when token is unavailable
      if: steps.snyk-auth.outputs.available != 'true'
      run: echo "Skipping Snyk scan because SNYK_TOKEN is not available in this workflow context."
    - name: Run Snyk to check Docker image for vulnerabilities
      if: steps.snyk-auth.outputs.available == 'true'
      continue-on-error: true
      uses: snyk/actions/docker@master
      with:
        image: ${{ matrix.agent }}:test
        args: --file=${{ matrix.agent }}/Dockerfile
    - name: Upload result to GitHub Code Scanning
      if: steps.snyk-auth.outputs.available == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: snyk.sarif
