services:
  mongo:
    image: mongo:5
    container_name: context_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 || mongo --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  chroma:
    image: chromadb/chroma
    volumes:
      - chroma_data:/data
    ports:
      - "8000:8000"
    networks:
      - internal
  context-agent:
    build: ../context-agent
    container_name: context_agent_web
    ports:
      - "5003:5000"
    volumes:
      - ../context-agent:/context-agent
      - ../migration:/migration
    working_dir: /context-agent
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=${FLASK_ENV:-development}
      - DEBUG=${DEBUG:-false}
      - TESTING=${TESTING:-false}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1/}
      - POLICY_AGENT_URL=${POLICY_AGENT_URL:-http://policy-agent:5000}
      - VALIDATOR_AGENT_URL=${VALIDATOR_AGENT_URL:-http://validator-agent:5000}
      - POLICY_AGENT_TIMEOUT_SECONDS=${POLICY_AGENT_TIMEOUT_SECONDS:-30}
      - VALIDATOR_AGENT_TIMEOUT_SECONDS=${VALIDATOR_AGENT_TIMEOUT_SECONDS:-30}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-262144}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,context-agent,policy-agent,validator-agent}
      - CONFIG_PATH=/context-agent/app/config/context_agent.yaml
      - QUESTIONS_CONFIG_PATH=/context-agent/app/config/context_questions.yaml
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  policy-agent:
    build: ../policy-agent
    container_name: policy_agent_service
    ports:
      - "5002:5000"
    volumes:
      - ../policy-agent:/policy-agent
    working_dir: /policy-agent
    environment:
      - FLASK_APP=app
      - FLASK_ENV=${FLASK_ENV:-development}
      - DEBUG=${DEBUG:-false}
      - TESTING=${TESTING:-false}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1/}
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - CHROMA_READINESS_MODE=${CHROMA_READINESS_MODE:-live}
      - RAG_VALIDATE_CHROMA=${RAG_VALIDATE_CHROMA:-false}
      - POLICY_AGENT_ALLOW_MODEL_DOWNLOAD=${POLICY_AGENT_ALLOW_MODEL_DOWNLOAD:-0}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-262144}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,context-agent,policy-agent,validator-agent}
      - RAG_SOURCES_PATH=/policy-agent/app/config/rag_sources.yaml
      - CONFIG_PATH=/policy-agent/app/config/policy_agent.yaml
    depends_on:
      mongo:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  validator-agent:
    build:
      context: ../validator-agent
    container_name: validator_agent_service
    ports:
      - "5001:5000"
    environment:
      - FLASK_APP=app
      - FLASK_ENV=${FLASK_ENV:-development}
      - DEBUG=${DEBUG:-false}
      - TESTING=${TESTING:-false}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1/}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_API_URL=${MISTRAL_API_URL:-https://api.mistral.ai/v1}
      - POLICY_AGENT_URL=${POLICY_AGENT_URL:-http://policy-agent:5000}
      - POLICY_AGENT_TIMEOUT_SECONDS=${POLICY_AGENT_TIMEOUT_SECONDS:-30}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-262144}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,context-agent,policy-agent,validator-agent}
      - CONFIG_PATH=/validator-agent/app/config/validator_agent.yaml
    volumes:
      - ../validator-agent:/validator-agent
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
volumes:
  mongo_data:
  chroma_data:
networks:
  internal:
