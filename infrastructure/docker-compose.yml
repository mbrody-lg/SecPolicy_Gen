services:
  mongo:
    image: mongo:5
    container_name: context_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 || mongo --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  chroma:
    image: chromadb/chroma
    volumes:
      - chroma_data:/data
    ports:
      - "8000:8000"
    networks:
      - internal
  context-agent:
    build: ../context-agent
    container_name: context_agent_web
    ports:
      - "5003:5000"
    volumes:
      - ../context-agent:/context-agent
      - ../migration:/migration
    working_dir: /context-agent
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POLICY_AGENT_URL=${POLICY_AGENT_URL}
      - CONFIG_PATH=/context-agent/app/config/context_agent.yaml
      - QUESTIONS_CONFIG_PATH=/context-agent/app/config/context_questions.yaml
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  policy-agent:
    build: ../policy-agent
    container_name: policy_agent_service
    ports:
      - "5002:5000"
    volumes:
      - ../policy-agent:/policy-agent
    working_dir: /policy-agent
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - CHROMA_READINESS_MODE=live
      - RAG_SOURCES_PATH=/policy-agent/app/config/rag_sources.yaml
      - CONFIG_PATH=/policy-agent/app/config/policy_agent.yaml
    depends_on:
      mongo:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  validator-agent:
    build:
      context: ../validator-agent
    container_name: validator_agent_service
    ports:
      - "5001:5000"
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_API_URL=${MISTRAL_API_URL}
      - POLICY_AGENT_URL=${POLICY_AGENT_URL}
      - CONFIG_PATH=/validator-agent/app/config/validator_agent.yaml
    volumes:
      - ../validator-agent:/validator-agent
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
volumes:
  mongo_data:
  chroma_data:
networks:
  internal:
