# Local/development Compose stack. It publishes host ports and bind-mounts
# service directories for iteration; it is not a production deployment file.
services:
  mongo:
    image: mongo:5
    container_name: context_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 || mongo --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  chroma:
    image: chromadb/chroma
    volumes:
      - chroma_data:/data
    ports:
      - "8000:8000"
    networks:
      - internal
  context-agent:
    build: ../context-agent
    container_name: context_agent_web
    ports:
      - "5003:5000"
    volumes:
      - ../context-agent:/context-agent
      - ../migration:/migration
    working_dir: /context-agent
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_RUN_DEBUG=${FLASK_RUN_DEBUG:-0}
      - DEBUG=${DEBUG:-false}
      - TESTING=${TESTING:-false}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1/}
      - POLICY_AGENT_URL=${POLICY_AGENT_URL:-http://policy-agent:5000}
      - VALIDATOR_AGENT_URL=${VALIDATOR_AGENT_URL:-http://validator-agent:5000}
      - POLICY_AGENT_TIMEOUT_SECONDS=${POLICY_AGENT_TIMEOUT_SECONDS:-30}
      - VALIDATOR_AGENT_TIMEOUT_SECONDS=${VALIDATOR_AGENT_TIMEOUT_SECONDS:-30}
      - PIPELINE_JOB_STALE_AFTER_SECONDS=${PIPELINE_JOB_STALE_AFTER_SECONDS:-1800}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-262144}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,127.0.0.1,context-agent,policy-agent,validator-agent}
      - CONFIG_PATH=/context-agent/app/config/context_agent.yaml
      - QUESTIONS_CONFIG_PATH=/context-agent/app/config/context_questions.yaml
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  policy-agent:
    build: ../policy-agent
    container_name: policy_agent_service
    ports:
      - "5002:5000"
    volumes:
      - ../policy-agent:/policy-agent
      - policy_model_cache:/root/.cache/huggingface
    working_dir: /policy-agent
    environment:
      - FLASK_APP=app
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_RUN_DEBUG=${FLASK_RUN_DEBUG:-0}
      - DEBUG=${DEBUG:-false}
      - TESTING=${TESTING:-false}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1/}
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - CHROMA_READINESS_MODE=${CHROMA_READINESS_MODE:-live}
      - RAG_VALIDATE_CHROMA=${RAG_VALIDATE_CHROMA:-false}
      - POLICY_AGENT_ALLOW_RAG_REFRESH=${POLICY_AGENT_ALLOW_RAG_REFRESH:-true}
      - POLICY_AGENT_RAG_REFRESH_TIMEOUT_SECONDS=${POLICY_AGENT_RAG_REFRESH_TIMEOUT_SECONDS:-2400}
      - POLICY_AGENT_ALLOW_MODEL_DOWNLOAD=${POLICY_AGENT_ALLOW_MODEL_DOWNLOAD:-0}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-262144}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,127.0.0.1,context-agent,policy-agent,validator-agent}
      - RAG_SOURCES_PATH=/policy-agent/app/config/rag_sources.yaml
      - CONFIG_PATH=/policy-agent/app/config/policy_agent.yaml
    depends_on:
      mongo:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  validator-agent:
    build:
      context: ../validator-agent
    container_name: validator_agent_service
    ports:
      - "5001:5000"
    environment:
      - FLASK_APP=app
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_RUN_DEBUG=${FLASK_RUN_DEBUG:-0}
      - DEBUG=${DEBUG:-false}
      - TESTING=${TESTING:-false}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1/}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_API_URL=${MISTRAL_API_URL:-https://api.mistral.ai/v1}
      - POLICY_AGENT_URL=${POLICY_AGENT_URL:-http://policy-agent:5000}
      - POLICY_AGENT_TIMEOUT_SECONDS=${POLICY_AGENT_TIMEOUT_SECONDS:-30}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-262144}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,127.0.0.1,context-agent,policy-agent,validator-agent}
      - CONFIG_PATH=/validator-agent/app/config/validator_agent.yaml
    volumes:
      - ../validator-agent:/validator-agent
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/ready').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  prometheus:
    image: prom/prometheus:v2.53.2
    container_name: secpolicy_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      context-agent:
        condition: service_started
      policy-agent:
        condition: service_started
      validator-agent:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  loki:
    image: grafana/loki:3.2.1
    container_name: secpolicy_loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/local-config.yml"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  promtail:
    image: grafana/promtail:3.2.1
    container_name: secpolicy_promtail
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_started
    networks:
      - internal
  grafana:
    image: grafana/grafana:11.2.2
    container_name: secpolicy_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
volumes:
  mongo_data:
  chroma_data:
  policy_model_cache:
  prometheus_data:
  loki_data:
  grafana_data:
networks:
  internal:
