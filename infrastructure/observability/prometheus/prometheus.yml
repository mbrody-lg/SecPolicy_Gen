global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: context-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["context-agent:5000"]

  - job_name: policy-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["policy-agent:5000"]

  - job_name: validator-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["validator-agent:5000"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
